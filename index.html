<!DOCTYPE html>

<head>

<style>

body{

.header{

.notice{

}

}

#choiceButtons{
  display:flex;

}

.choice-button{
  border:none;

.control-area{

}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    制度相談チャット ver.1
  </div>

  <div class="notice">
    詳細は医療機関の医療福祉相談員へご相談ください
  </div>

  <div id="chat"></div>

  <div id="choiceButtons"></div>

  <div class="control-area">

    <button
      class="control-btn back-btn"
      onclick="goBack()">
      戻る
    </button>

    <button
      class="control-btn reset-btn"
      onclick="resetApp()">
      リセット
    </button>

  </div>

</div>

<script>

/* =========================================
   STATE
========================================= */

const state = {

  currentScreen:"start",

  user:{
    age:"",
    insurance:"",
    burdenRate:"",
    limit:"",
    careLevel:"",
    mealStage:"",
    supportSystems:[]
  },

  history:[],
  messages:[]

};

/* =========================================
   SCREEN DEFINITIONS
========================================= */

const screens = {

  start:{
    text:`現役の急性期病院で働く
医療福祉相談員（MSW）が作成した

医療費・介護保険・転院先・障害福祉制度など、

※実際の適用可否は自治体や保険者、

    ]
  },

  
  age:{

  },

    ]
  },

    text:"食事・居住費負担減額証の区分を選択してください。",
    buttons:[
      "なし",
      "第四段階（課税）",
      "第三段階①",
      "第三段階②",
      "第二段階",
      "第一段階",
    ]
  },

  supportSystems:{

  buttons:[
    "なし",
    "身障者手帳",
    "精神手帳",

    "県障",
    "県親",
    "特定疾病",

    "小児慢性特定疾病",
    "決定"
  ]
},

  mainMenu:{
  text:"相談内容を選択してください。",
  buttons:[
    "医療費",
    "介護保険",
    "転院・施設",
    "身障者手帳",
    "透析",
    "難病"
  ]
},

medicalMenu:{
  text:"医療費の相談内容を選択してください。",
  buttons:[
    "高額療養費（入院）",
    "高額療養費（外来）",
    "限度額適用認定証",
    "特定疾病",
    "自立支援医療",
    "県障",
    "県親",
    "子ども医療",
    "生活保護"
  ]
},

careMenu:{
  text:"介護保険の相談内容を選択してください。",
  buttons:[
    "高額介護サービス費",
    "負担限度額認定",
    "介護サービス"
  ]
},

transferMenu:{
  text:"転院・施設を選択してください。",
  buttons:[
    "回復期リハ",
    "地域包括ケア病棟",
    "療養病院",
    "老健",
    "特養"
  ]
},

disabilityMenu:{
  text:"身障者手帳について選択してください。",
  buttons:[
    "対象",
    "等級",
    "申請方法"
  ]
},

dialysisMenu:{
  text:"透析関連制度を選択してください。",
  buttons:[
    "特定疾病",
    "更生医療",
    "身障者手帳"
  ]
},

rareDiseaseMenu:{
  text:"難病医療費助成について",
  buttons:[
    "対象",
    "申請方法",
    "更新"
  ]
},
};

/* =========================================
   HIGH COST DATA
========================================= */

const HIGH_COST_DATA = {

  outpatient:{

    over70:{

      "現役Ⅲ":{ limit:252600 },
      "現役Ⅱ":{ limit:167400 },
      "現役Ⅰ":{ limit:80100 },
      "一般":{ limit:18000 },
      "低Ⅱ":{ limit:8000 },
      "低Ⅰ":{ limit:8000 }

    },

    under70:{

      "ア":{ limit:252600 },
      "イ":{ limit:167400 },
      "ウ":{ limit:80100 },
      "エ":{ limit:57600 },
      "オ":{ limit:35400 }

    }

  },

  inpatient:{

    over70:{

      "現役Ⅲ":{
        limit:252600,
        mealCost:510
      },

      "現役Ⅱ":{
        limit:167400,
        mealCost:510
      },

      "現役Ⅰ":{
        limit:80100,
        mealCost:510
      },

      "一般":{
        limit:57600,
        mealCost:510
      },

      "低Ⅱ":{
        limit:24600,
        mealCost:240
      },

      "低Ⅰ":{
        limit:15000,
        mealCost:110
      }

    },

    under70:{

      "ア":{
        limit:252600,
        mealCost:510
      },

      "イ":{
        limit:167400,
        mealCost:510
      },

      "ウ":{
        limit:80100,
        mealCost:510
      },

      "エ":{
        limit:57600,
        mealCost:510
      },

      "オ":{
        limit:35400,
        mealCost:240
      }

    }

  }

};

/* =========================================
   VALIDATORS
========================================= */

const validators = {

  insuranceButtons(){

    if(state.user.age === "75歳以上"){

      return [
        "後期高齢者",
        "協会けんぽ",
        "共済・組合等",
        "生活保護"
      ];

    }

    if([
      "0〜19歳",
      "20代",
      "30代",
      "40代",
      "50代"
    ].includes(state.user.age)){

      return [
        "国民健康保険",
        "協会けんぽ",
        "共済・組合等",
        "生活保護"
      ];

    }

    return [
      "国民健康保険",
      "協会けんぽ",
      "共済・組合等",
      "後期高齢者",
      "生活保護"
    ];

  },

  burdenRateButtons(){

    if(state.user.insurance === "生活保護"){
      return [];
    }

    if(
      state.user.age === "75歳以上"
      &&
      state.user.insurance === "後期高齢者"
    ){

      return [
        "1割",
        "2割",
        "3割"
      ];

    }

    if(
      [
        "20代",
        "30代",
        "40代",
        "50代",
        "60代"
      ].includes(state.user.age)
    ){

      return [
        "3割"
      ];

    }

    return [
      "1割",
      "2割",
      "3割"
    ];

  },

  skipBurdenRate(){

    return (
      state.user.insurance ===
      "生活保護"
    );

  },

  isOver70(){

    return (
      state.user.age === "70歳〜74歳"
      ||
      state.user.age === "75歳以上"
    );

  }

};

/* =========================================
   TEMPLATE SYSTEM
========================================= */

const templates = {

  highCost:{

    welfare(){

      return `【高額療養費】

生活保護受給中の方は、
医療扶助が優先されるため、
通常の高額療養費制度は
対象外となります。`;

    },

    outpatient(data){

      return `【高額療養費（外来）】

【外来自己負担上限】

${formatYen(data.limit)}

外来診療にかかった
自己負担額について、
月ごとの上限額を超えた場合、
払い過ぎた分が
後日還付されます。

病院・薬局等を
同月内で合算します。`;

    },

    inpatient(data){

      const monthlyMeal =
        data.mealCost * 3 * 30;

      return `【高額療養費（入院）】

【自己負担限度額】

${formatYen(data.limit)}

入院医療費の
自己負担額について、
月ごとの上限額を超えた場合、
払い過ぎた分が
後日還付されます。

【入院食事代】

1食
${formatYen(data.mealCost)}

1日3食 × 30日

＝ ${formatYen(monthlyMeal)}

【高額療養費対象外】

・入院食事代
・CSセット
・個室代
・差額ベッド代`;

    }

  }

};

/* =========================================
   HIGH COST SERVICE
========================================= */

const highCostService = {

  getOutpatientData(){

    if(validators.isOver70()){

      return HIGH_COST_DATA
        .outpatient
        .over70[
          state.user.limit
        ];

    }

    return HIGH_COST_DATA
      .outpatient
      .under70[
        state.user.limit
      ];

  },

  getInpatientData(){

    if(validators.isOver70()){

      return HIGH_COST_DATA
        .inpatient
        .over70[
          state.user.limit
        ];

    }

    return HIGH_COST_DATA
      .inpatient
      .under70[
        state.user.limit
      ];

  }

};

/* =========================================
   MENU MODULES
========================================= */

const menuModules = {

  "医療費":()=>{
    state.currentScreen = "medicalMenu";
    renderScreen();
  },

  "高額療養費（入院）":()=>{
    showHighCostInpatient();
  },

  "高額療養費（外来）":()=>{
    showHighCostOutpatient();
  }

};

/* =========================================
   TRANSITIONS
========================================= */

const transitions = {

start:{
  reducer:(text)=>{},
  next:()=>{
    return "age";
  }
},

  age:{
    reducer:(text)=>{
      state.user.age = text;
    },
    next:()=>{
      return "insurance";
    }
  },

  insurance:{

    reducer:(text)=>{

      state.user.insurance = text;

      if(text === "生活保護"){

        state.user.burdenRate = "なし";
        state.user.limit = "対象外";

      }

    },

    next:()=>{

      if(validators.skipBurdenRate()){
        return "careLevel";
      }

      return "burdenRate";

    }

  },

  burdenRate:{
  reducer:(text)=>{

    state.user.burdenRate = text;

    // 後期高齢者2割は一般固定
    if(
      state.user.insurance === "後期高齢者" &&
      text === "2割"
    ){
      state.user.limit = "一般";
    }

  },

  next:()=>{

    if(
      state.user.insurance === "後期高齢者" &&
      state.user.burdenRate === "2割"
    ){
      return "careLevel";
    }

    return "limit";

  }
},

  limit:{
    reducer:(text)=>{
      state.user.limit = text;
    },
    next:()=>{
      return "careLevel";
    }
  },

  careLevel:{

    reducer:(text)=>{

      state.user.careLevel = text;

      if(text === "なし"){
        state.user.mealStage = "なし";
      }

    },

    next:()=>{

      if(state.user.careLevel === "なし"){
        return "supportSystems";
      }

      return "mealStage";

    }

  },

  mealStage:{

    reducer:(text)=>{
      state.user.mealStage = text;
    },

    next:()=>{
      return "supportSystems";
    }

  },

  supportSystems:{

    reducer:(text)=>{

      if(text === "なし"){

        state.user.supportSystems = [];

        releaseInfoBox();

        return;

      }

      if(text === "決定"){

        releaseInfoBox();

        return;

      }

      if(
        !state.user.supportSystems
          .includes(text)
      ){

        state.user.supportSystems
          .push(text);

      }

    },

    next:(selected)=>{

      if(
        selected === "決定"
        ||
        selected === "なし"
      ){
        return "mainMenu";
      }

      return "supportSystems";

    }

  },

  mainMenu:{

  reducer:(text)=>{},

  next:(text)=>{

    if(text==="医療費") return "medicalMenu";
    if(text==="介護保険") return "careMenu";
    if(text==="転院・施設") return "transferMenu";
    if(text==="身障者手帳") return "disabilityMenu";
    if(text==="透析") return "dialysisMenu";
    if(text==="難病") return "rareDiseaseMenu";

    return "mainMenu";

  }

}

};

/* =========================================
   FORMAT
========================================= */

function formatYen(num){

  return Number(num)
    .toLocaleString() + "円";

}

/* =========================================
   RENDER
========================================= */

function renderScreen(){
  

  const screen =
    screens[state.currentScreen];

  addBotMessage(screen.text);

  renderButtons();

}

function renderButtons(){

  const area =
    document.getElementById(
      "choiceButtons"
    );

  area.innerHTML = "";

  let buttons = [];

  if(state.currentScreen === "insurance"){

    buttons =
      validators.insuranceButtons();

  }

  else if(
    state.currentScreen ===
    "burdenRate"
  ){

    buttons =
      validators.burdenRateButtons();

  }

  else if(
    state.currentScreen ===
    "limit"
  ){

    if(
      state.user.insurance ===
      "後期高齢者"
    ){

      if(
        state.user.burdenRate ===
        "3割"
      ){

        buttons = [
          "現役Ⅲ",
          "現役Ⅱ",
          "現役Ⅰ",
          "不明"
        ];

      }

      else if(
        state.user.burdenRate ===
        "2割"
      ){

        buttons = [
          "一般"
        ];

      }

      else if(
        state.user.burdenRate ===
        "1割"
      ){

        buttons = [
          "一般",
          "低Ⅱ",
          "低Ⅰ",
          "不明"
        ];

      }

    }

    else if(
      validators.isOver70()
    ){

      buttons = [
        "現役Ⅲ",
        "現役Ⅱ",
        "現役Ⅰ",
        "一般",
        "低Ⅱ",
        "低Ⅰ"
      ];

    }

    else{

      buttons = [
        "ア",
        "イ",
        "ウ",
        "エ",
        "オ",
        "不明"
      ];

    }

  }

  else{

    buttons =
      screens[
        state.currentScreen
      ].buttons || [];

  }

  buttons.forEach(text=>{

    const button =
      document.createElement("button");

    button.className =
      "choice-button";

    button.innerText = text;

if(text === "なし"){
  button.style.background = "#6b7280";
}

if(text === "決定"){
  button.style.background = "#16a34a";
}

    button.onclick =
      ()=>handleSelect(text);
      area.appendChild(button);

});

}

    
/* =========================================
   MESSAGE
========================================= */

function addMessage(role,text){

  state.messages.push({
    role,
    text
  });

  const div =
    document.createElement("div");

  div.className =
    "message " + role;

  div.innerText = text;

  document
    .getElementById("chat")
    .appendChild(div);

  scrollBottom();

}

function addBotMessage(text){
  addMessage("bot",text);
}

function addUserMessage(text){
  addMessage("user",text);
}

function scrollBottom(){

  const chat =
    document.getElementById("chat");

  chat.scrollTop =
    chat.scrollHeight;

}

/* =========================================
   HANDLE SELECT
========================================= */

function handleSelect(text){

  saveHistory();

  addUserMessage(text);

  const menuScreens = [
    "medicalMenu",
    "careMenu",
    "transferMenu",
    "disabilityMenu",
    "dialysisMenu",
    "rareDiseaseMenu"
  ];

  if(
    menuScreens.includes(
      state.currentScreen
    )
  ){

    executeMenu(text);
    return;

  }

  const transition =
    transitions[
      state.currentScreen
    ];

  if(!transition){
    return;
  }

  transition.reducer(text);

  state.currentScreen =
    transition.next(text);

  renderScreen();

}

/* =========================================
   MENU EXECUTION
========================================= */

function executeMenu(text){

  const module =
    menuModules[text];

  if(!module){
    return;
  }

  module();

}

/* =========================================
   HIGH COST
========================================= */

function showHighCostOutpatient(){
  if(state.user.limit === "不明"){

  addBotMessage(`【高額療養費】

限度額区分が不明です。

【マイナ保険証をお持ちの方】

医療機関の窓口で限度額情報の
確認手続きを行うことで、
自己負担限度額を確認できます。

【マイナ保険証をお持ちでない方】

保険者
（市区町村国保・協会けんぽ・
共済組合・健康保険組合等）へ
限度額適用認定証の申請が必要です。

詳しくは加入している保険者へ
お問い合わせください。`);

return;

}

  if(
    validators.skipBurdenRate()
  ){

    addBotMessage(
      templates.highCost.welfare()
    );

    return;

  }

  const data =
    highCostService
      .getOutpatientData();

  addBotMessage(
    templates.highCost
      .outpatient(data)
  );

}

function showHighCostInpatient(){
  if(state.user.limit === "不明"){

  addBotMessage(`【高額療養費】

限度額区分が不明です。

【マイナ保険証をお持ちの方】

医療機関の窓口で限度額情報の
確認手続きを行うことで、
自己負担限度額を確認できます。

【マイナ保険証をお持ちでない方】

保険者
（市区町村国保・協会けんぽ・
共済組合・健康保険組合等）へ
限度額適用認定証の申請が必要です。

詳しくは加入している保険者へ
お問い合わせください。`);

return;

}

  if(
    validators.skipBurdenRate()
  ){

    addBotMessage(
      templates.highCost.welfare()
    );

    return;

  }

  const data =
    highCostService
      .getInpatientData();

  addBotMessage(
    templates.highCost
      .inpatient(data)
  );

}

/* =========================================
   HISTORY
========================================= */

function saveHistory(){

  state.history.push({

    currentScreen:
      state.currentScreen,

    user:
      structuredClone(state.user),

    messages:
      structuredClone(
        state.messages
      )

  });

}

function goBack(){

  if(
    state.history.length === 0
  ){
    return;
  }

  const prev =
    state.history.pop();

  state.currentScreen =
    prev.currentScreen;

  state.user =
    prev.user;

  state.messages =
    prev.messages;

  rebuildChat();

  renderButtons();


}

/* =========================================
   REBUILD
========================================= */

function rebuildChat(){

  const chat =
    document.getElementById("chat");

  chat.innerHTML ="";

  state.messages.forEach(msg=>{

    const div =
      document.createElement("div");

    div.className =
      "message " + msg.role;

    div.innerText =
      msg.text;

    chat.appendChild(div);

  });

}

/* =========================================
   RESET
========================================= */

function resetApp(){

  state.currentScreen = "start";

  state.user = {

    age:"",
    insurance:"",
    burdenRate:"",
    limit:"",
    careLevel:"",
    mealStage:"",
    supportSystems:[]

  };

  state.history = [];
  state.messages = [];

  const chat =
    document.getElementById("chat");

  chat.innerHTML ="";

  renderScreen();

}

/* =========================================
   INFO BOX RELEASE
========================================= */

function releaseInfoBox(){

  const box =
    document.querySelector(
      ".info-box"
    );

  if(!box){
    return;
  }

  box.style.position =
    "relative";

}

/* =========================================
   START
========================================= */

window.onload = ()=>{

  renderScreen();

};

</script>
