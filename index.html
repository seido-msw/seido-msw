/* =========================================
   VALIDATORS
========================================= */

const validators = {

  insuranceButtons(){

    if(state.user.age === "75歳以上"){

      return [
        "後期高齢者",
        "協会けんぽ",
        "共済・組合等",
        "生活保護"
      ];

    }

    if([
      "0〜19歳",
      "20代",
      "30代",
      "40代",
      "50代"
    ].includes(state.user.age)){

      return [
        "国民健康保険",
        "協会けんぽ",
        "共済・組合等",
        "生活保護"
      ];

    }

    return [
      "国民健康保険",
      "協会けんぽ",
      "共済・組合等",
      "後期高齢者",
      "生活保護"
    ];

  },

  burdenRateButtons(){

    if(state.user.insurance === "生活保護"){
      return [];
    }

    if(
      state.user.age === "75歳以上"
      &&
      state.user.insurance === "後期高齢者"
    ){

      return [
        "不明",
        "1割",
        "2割",
        "3割"
      ];

    }

    if(
      [
        "20代",
        "30代",
        "40代",
        "50代",
        "60代"
      ].includes(state.user.age)
    ){

      return [
        "3割"
      ];

    }

    return [
      "不明",
      "1割",
      "2割",
      "3割"
    ];

  },

  skipBurdenRate(){

    return (
      state.user.insurance ===
      "生活保護"
    );

  },

  isOver70(){

    return (
      state.user.age === "70歳〜74歳"
      ||
      state.user.age === "75歳以上"
    );

  }

};

/* =========================================
   TRANSITIONS
========================================= */

const transitions = {

  start:{
  reducer:(text)=>{},
  next:()=>{
    return "purpose";
  }
},

purpose:{

  reducer:(text)=>{
    state.user.purpose=text;
  },

  next:(text)=>{

    if(text==="入院中"){
      return "inpatientMenu";
    }

    if(text==="外来通院中"){
      return "outpatientMenu";
    }

    if(text==="制度を知りたい"){
      return "age";
    }

  }

},

  age:{
    reducer:(text)=>{
      state.user.age = text;
    },
    next:()=>{
      return "insurance";
    }
  },

  insurance:{

    reducer:(text)=>{

      state.user.insurance = text;

      if(text === "生活保護"){

        state.user.burdenRate = "なし";
        state.user.limit = "対象外";

      }

    },

    next:()=>{

      if(validators.skipBurdenRate()){
        return "careLevel";
      }

      return "burdenRate";

    }

  },

  burdenRate:{
  reducer:(text)=>{

    state.user.burdenRate = text;

    if(text === "不明"){
      state.user.limit = "不明";
      return;
    }

    if(
      state.user.insurance === "後期高齢者" &&
      text === "2割"
    ){
      state.user.limit = "一般";
    }

  },

  next:()=>{

  if(state.user.burdenRate === "不明"){
    return "careLevel";
  }

  if(
    state.user.insurance === "後期高齢者" &&
    state.user.burdenRate === "2割"
  ){
    return "careLevel";
  }

  return "limit";

}
},

  limit:{
    reducer:(text)=>{
      state.user.limit = text;
    },
    next:()=>{
      return "careLevel";
    }
  },

  careLevel:{

    reducer:(text)=>{

      state.user.careLevel = text;

      if(text === "なし"){
        state.user.mealStage = "なし";
      }

    },

    next:()=>{

      if(state.user.careLevel === "なし"){
        return "supportSystems";
      }

      return "mealStage";

    }

  },

  mealStage:{

    reducer:(text)=>{
      state.user.mealStage = text;
    },

    next:()=>{
      return "supportSystems";
    }

  },

  supportSystems:{

    reducer:(text)=>{

      if(text === "なし"){

        state.user.supportSystems = [];

        releaseInfoBox();

        return;

      }

      if(text === "決定"){

        releaseInfoBox();

        return;

      }

      if(
        !state.user.supportSystems
          .includes(text)
      ){

        state.user.supportSystems
          .push(text);

      }

    },

    next:(selected)=>{

      if(
        selected === "決定"
        ||
        selected === "なし"
      ){
        return "mainMenu";
      }

      return "supportSystems";

    }

  },

mainMenu:{

reducer:(text)=>{},

next:(text)=>{

if(text==="医療費") return "medicalMenu";
if(text==="介護保険") return "careMenu";
if(text==="退院・生活") return "lifeMenu";
if(text==="障害福祉") return "welfareMenu";
return "mainMenu";

}

}
};

}

function renderScreen(){

  const screen = screens[state.currentScreen];

  addQuestionCard(screen.text);

  renderButtons();

  requestAnimationFrame(() => {

    const latest = document.querySelector(".question-card.latest");

    if (!latest) return;

    const chat = document.getElementById("chat");

    // チャット内での位置
    chat.scrollTop =
      latest.offsetTop - 10;

  });

}
function renderButtons(){

  const area =
    document.getElementById(
      "choiceButtons"
    );

  area.innerHTML = "";

  let buttons = [];

  if(state.currentScreen === "insurance"){

    buttons =
      validators.insuranceButtons();

  }

  else if(
    state.currentScreen ===
    "burdenRate"
  ){

    buttons =
      validators.burdenRateButtons();

  }

  else if(
    state.currentScreen ===
    "limit"
  ){

    if(
      state.user.insurance ===
      "後期高齢者"
    ){

      if(
        state.user.burdenRate ===
        "3割"
      ){

        buttons = [
          "現役Ⅲ",
          "現役Ⅱ",
          "現役Ⅰ",
          "不明"
        ];

      }

      else if(
        state.user.burdenRate ===
        "2割"
      ){

        buttons = [
          "一般"
        ];

      }

      else if(
        state.user.burdenRate ===
        "1割"
      ){

        buttons = [
          "一般",
          "低Ⅱ",
          "低Ⅰ",
          "不明"
        ];

      }

    }

    else if(
      validators.isOver70()
    ){

      buttons = [
        "現役Ⅲ",
        "現役Ⅱ",
        "現役Ⅰ",
        "一般",
        "低Ⅱ",
        "低Ⅰ"
      ];

    }

    else{

      buttons = [
        "ア",
        "イ",
        "ウ",
        "エ",
        "オ",
        "不明"
      ];

    }

  }

  else{

    buttons =
      screens[
        state.currentScreen
      ].buttons || [];

  }

  buttons.forEach(text=>{

    const button =
      document.createElement("button");

    button.className =
      "choice-button";

    button.innerText = text;

if(text === "なし"){
  button.style.background = "#6b7280";
  button.style.color = "white";
}

if(text === "決定"){
  button.style.background = "#15803d";
  button.style.color = "white";
  button.style.fontWeight = "bold";
}
    button.onclick =
      ()=>handleSelect(text);
      area.appendChild(button);

});

}

    
/* =========================================
   MESSAGE
========================================= */

function addMessage(role,text){

  state.messages.push({
    role,
    text
  });

  const div =
    document.createElement("div");

  div.className =
    "message " + role;

  div.innerText = text;

  document
    .getElementById("chat")
    .appendChild(div);

  return div;

}

function addBotMessage(text){

  const div = addMessage("bot",text);

  requestAnimationFrame(() => {

    const chat = document.getElementById("chat");

    chat.scrollTop = div.offsetTop - 10;

  });

}

function addUserMessage(text){
  addMessage("user",text);
}

function addQuestionCard(text){

  document
    .querySelectorAll(".question-card")
    .forEach(card=>{
      card.classList.remove("latest");
    });

  state.messages.push({
    role:"question",
    text
  });

  const div =
    document.createElement("div");

  div.className =
    "question-card latest";

  div.innerText = text;

  document
    .getElementById("chat")
    .appendChild(div);

}
/* =========================================
   HANDLE SELECT
========================================= */

function handleSelect(text){

  saveHistory();

  addUserMessage(text);

const menuScreens = [
  "medicalMenu",
  "careMenu",
  "transferMenu",
  
"medicalMenu",
"medicalConcernMenu",
"medicalCostMenu",
"paymentProblemMenu",
"medicalAidMenu",

  "disabilityMenu",
  "dialysisMenu",
  "rareDiseaseMenu",

  "inpatientMenu",
  "outpatientMenu",
 

  "dischargeMenu",
  "transferReasonMenu",
  "transferRehabMenu",
  "medicalProcedureMenu",
  "palliativeCareMenu",   // ←追加
  "longStayMenu",
  "facilityMenu",
  "careInpatientMenu",
  "disabilityInpatientMenu"
];

  if(
    menuScreens.includes(
      state.currentScreen
    )
  ){

    executeMenu(text);
    return;

  }

  const transition =
    transitions[
      state.currentScreen
    ];

  if(!transition){
    return;
  }

  transition.reducer(text);

  state.currentScreen =
    transition.next(text);

  renderScreen();

}

/* =========================================
   MENU EXECUTION
========================================= */

function executeMenu(text){

  const module =
    menuModules[text];

  if(!module){
    return;
  }

  module();

}

/* =========================================
   HISTORY
========================================= */

function saveHistory(){

  state.history.push({

    currentScreen:
      state.currentScreen,

    user:
      structuredClone(state.user),

    messages:
      structuredClone(
        state.messages
      )

  });

}

function goBack(){

  if(state.history.length === 0){
    return;
  }

  const prev =
    state.history.pop();

  state.currentScreen =
    prev.currentScreen;

  state.user =
    prev.user;

  state.messages =
    prev.messages;

  rebuildChat();

  renderButtons();

}
/* =========================================
   REBUILD
========================================= */

function rebuildChat(){

  const chat =
    document.getElementById("chat");

  chat.innerHTML ="";

  const lastQuestionIndex =
    [...state.messages]
      .map((m,i)=> m.role==="question" ? i : -1)
      .filter(i=>i!==-1)
      .pop();

  state.messages.forEach((msg,i)=>{

    const div =
      document.createElement("div");

    if(msg.role==="question"){

      div.className =
        i===lastQuestionIndex
          ? "question-card latest"
          : "question-card";

    }else{

      div.className =
        "message " + msg.role;

    }

    div.innerText = msg.text;

    chat.appendChild(div);

  });

}

========================================= */

function resetApp(){

  state.currentScreen = "start";

  state.user = {
  age:"",

  supportSystems:[],

};

  state.history = [];

    document.getElementById("chat");

}
